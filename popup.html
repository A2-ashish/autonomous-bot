<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NetAcad Scraper Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
      background-color: #f4f7f6;
    }
    h3 {
      color: #0056b3;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
      color: #333;
    }
    input[type="text"], input[type="password"] {
      width: calc(100% - 22px);
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #007bff;
      color: white;
      padding: 10px 15px;
      margin-top: 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <h3>NetAcad AI Assistant</h3>
  
  <label for="apiKeys">Gemini API Keys <small style="color:#888;">(one per line — rotates on quota)</small>:</label>
  <textarea id="apiKeys" rows="4" placeholder="Paste API key 1 here&#10;Paste API key 2 here&#10;..." style="width:calc(100% - 18px);padding:7px;margin-top:5px;border:1px solid #ccc;border-radius:4px;font-size:12px;resize:vertical;font-family:monospace;"></textarea>

  <div id="keyStatus" style="margin:5px 0 0 0;font-size:0.82em;color:#555;min-height:16px;"></div>

  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="showAnswersToggle" checked style="margin-right: 6px;">
    <label for="showAnswersToggle" style="cursor: pointer;">Show AI Answers</label>
  </div>

  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="processOnSwitchToggle" checked style="margin-right: 6px;">
    <label for="processOnSwitchToggle" style="cursor: pointer;">Process on Page Switch</label>
  </div>
  
  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="autonomousBotToggle" style="margin-right: 6px;">
    <label for="autonomousBotToggle" style="cursor: pointer; color: #43a047; font-weight: bold;">🤖 Full Autonomous Bot</label>
  </div>
  
  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="quizOnlyModeToggle" style="margin-right: 6px;">
    <label for="quizOnlyModeToggle" style="cursor: pointer; color: #f57c00; font-weight: bold;">🎯 Quiz Only Mode</label>
  </div>
  
  <!-- Add model selection dropdown -->
  <div style="margin: 15px 0 5px 0;">
    <label for="modelSelect" style="display: block; font-weight: bold; margin-bottom: 5px;">AI Model (Free Tier Only):</label>
    <select id="modelSelect" style="width: 100%; padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px;">
      <option value="gemini-2.5-flash">Gemini 2.5 Flash (Recommended)</option>
      <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (Ultra Fast)</option>
      <option value="gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro Preview (Best Quality)</option>
      <option value="gemini-2.0-flash">Gemini 2.0 Flash (Stable)</option>
      <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
      <option value="gemini-1.5-pro">Gemini 1.5 Pro (Long Context)</option>
      <option value="gemma-2-27b-it">Gemma 2 27B (Open Model)</option>
    </select>
  </div>
  
  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="devModeToggle" style="margin-right: 6px;">
    <label for="devModeToggle" style="cursor: pointer; color: #888;">Developer Status Overlay</label>
  </div>
  
  <div style="margin: 10px 0 0 0; display: flex; align-items: center;">
    <input type="checkbox" id="betaModeToggle" style="margin-right: 6px;">
    <label for="betaModeToggle" style="cursor: pointer; color: #e91e63; font-weight: bold;">⚡ Beta Mode (Instant Scroll Skip)</label>
  </div>
  
  <button id="saveKey">Save API Key</button>
  
  <button id="processPage">Process Questions on this Page</button>

  <div id="status"></div>
  <small>You can press Alt+Shift+Q to process questions on the current page.</small>

  <script src="popup.js"></script>
</body>
</html>
